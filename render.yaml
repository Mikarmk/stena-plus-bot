services:
  - type: web
    name: stena-plus-bot
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: PORT
        value: 10000
      - key: BOT_TOKEN
        sync: false
      - key: PAYMENT_PROVIDER_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MINI_APP_URL
        sync: false
